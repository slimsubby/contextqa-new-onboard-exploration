kind = "web"
previewPath = "/"
title = "ContextQA"
version = "1.0.0"
id = "artifacts/context-qa"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24792

[services.development]
run = "pnpm --filter @workspace/context-qa run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/context-qa", "run", "build" ]
publicDir = "artifacts/context-qa/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24792"
BASE_PATH = "/"
