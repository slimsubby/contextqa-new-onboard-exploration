<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script>
  gsap.set("#right-arm", { svgOrigin: "143 144", rotation: 75 });
  gsap.set("#left-arm",  { svgOrigin: "74 138" });
  gsap.set("#head",      { svgOrigin: "109 115" });
  gsap.set(["#left-heart", "#right-heart"], { opacity: 0, transformOrigin: "center center", scale: 1.5 });

  // Continuous gentle hover (background)
  gsap.to("#hover", {
    y: -10,
    duration: 1.4,
    ease: "sine.inOut",
    yoyo: true,
    repeat: -1
  });

  // Head tilt (kept)
  gsap.timeline({ repeat: -1, repeatDelay: 4, defaults: { ease: "sine.inOut" } })
    .to("#head", { rotation: 3, duration: 0.8 })
    .to("#head", { rotation: 6, duration: 0.6, delay: 0.3 })
    .to("#head", { rotation: 0, duration: 0.9, delay: 0.5 });

  // Both arms thrown up — celebration!
  // Right arm pivots at (143,144); rotating -60° throws hand straight up.
  // Left arm pivots at (74,138); rotating +115° throws hand up on the left side.
  gsap.timeline({ repeat: -1, repeatDelay: 0.5 })
    // eyes -> hearts cross-fade (begins early, before the throw)
    .to(["#left-eye", "#right-eye"],     { opacity: 0, duration: 0.45, ease: "power2.inOut" }, 0)
    .to(["#left-heart", "#right-heart"], { opacity: 1, duration: 0.45, ease: "power2.inOut" }, 0)
    // jump up + throw arms up together (delayed so heart fade can lead)
    .to("#robot",     { y: -28, duration: 0.32, ease: "power2.out" }, 0.5)
    .to("#right-arm", { rotation: -20, duration: 0.35, ease: "back.out(2)" }, 0.5)
    .to("#left-arm",  { rotation: 92,  duration: 0.35, ease: "back.out(2)" }, 0.5)
    // excited little pumps while up in the air
    .to("#right-arm", { rotation: -10, duration: 0.16, yoyo: true, repeat: 3, ease: "sine.inOut" }, ">")
    .to("#left-arm",  { rotation: 82,  duration: 0.16, yoyo: true, repeat: 3, ease: "sine.inOut" }, "<")
    // hearts -> eyes cross-fade (gradual, overlapping with land)
    .to(["#left-heart", "#right-heart"], { opacity: 0, duration: 0.45, ease: "power2.inOut" }, ">-0.15")
    .to(["#left-eye", "#right-eye"],     { opacity: 1, duration: 0.45, ease: "power2.inOut" }, "<")
    // land + bring arms down
    .to("#robot",     { y: 0,  duration: 0.35, ease: "power2.in" }, "<")
    .to("#right-arm", { rotation: 75, duration: 0.45, ease: "power2.inOut" }, "<")
    .to("#left-arm",  { rotation: 0,  duration: 0.45, ease: "power2.inOut" }, "<");

  function scheduleBlink() {
    gsap.timeline({ onComplete: scheduleBlink, delay: 2 + Math.random() * 2.5 })
      .to("#eyes", { opacity: 0, duration: 0.18, ease: "power2.inOut" })
      .to("#eyes", { opacity: 1, duration: 0.22, ease: "power2.inOut" });
  }
  scheduleBlink();
</script>
